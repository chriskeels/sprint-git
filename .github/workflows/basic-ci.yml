name: App CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Use a concurrency group to ensure only one workflow runs per branch at a time
# and cancel any in-progress runs when a new commit is pushed.
concurrency:
  group: app-ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

  # Three Jobs in this workflow:
  # Validate, Publish Image, Deploy
jobs:
  # Validation job runs on every push and PR, and ensures the app builds correctly and the Docker configuration is valid.
  validate:
    name: Validate application
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://brightpath_user:brightpath_password@localhost:5432/brightpath_db
      JWT_SECRET: ci-jwt-secret
      OPENAI_API_KEY: ci-placeholder-key
      OPENAI_MODEL: gpt-4o-mini
      NEXT_TELEMETRY_DISABLED: "1"
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: brightpath_user
          POSTGRES_PASSWORD: brightpath_password
          POSTGRES_DB: brightpath_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brightpath_user -d brightpath_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize database schema
        run: npm run db:init

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build Docker image
        run: docker build --tag stackup-app:${{ github.sha }} .

  # Only works if validation passes, and only on develop or main branches (not on PRs)
  publish-image:
    name: Publish container image
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  
  deploy:
    name: Deploy to EC2
    needs: publish-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io docker-compose-v2
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            # Log in to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image and restart
            cd /home/ubuntu/app || mkdir -p /home/ubuntu/app && cd /home/ubuntu/app

            cat > docker-compose.yml << 'EOF'
            services:
              app:
                image: ${{ env.IMAGE_NAME }}:main
                container_name: brightpath-app
                ports:
                  - "80:3000"
                environment:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  OPENAI_MODEL: gpt-4o-mini
                  NODE_ENV: production
                restart: always
            EOF

            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
            sudo docker exec brightpath-app node ./lib/db-init.js
            sudo docker image prune -f
