name: App CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: app-ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  validate:
    name: Validate application
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://brightpath_user:brightpath_password@localhost:5432/brightpath_db
      JWT_SECRET: ci-jwt-secret
      OPENAI_API_KEY: ci-placeholder-key
      OPENAI_MODEL: gpt-4o-mini
      NEXT_TELEMETRY_DISABLED: "1"
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: brightpath_user
          POSTGRES_PASSWORD: brightpath_password
          POSTGRES_DB: brightpath_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brightpath_user -d brightpath_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize database schema
        run: npm run db:init

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build Docker image
        run: docker build --tag stackup-app:${{ github.sha }} .

  publish-image:
    name: Publish container image
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
