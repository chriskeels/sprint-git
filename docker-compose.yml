services:
  db:
    image: postgres:15
    container_name: brightpath-db
    restart: always

    environment:
      POSTGRES_USER: brightpath_user
      POSTGRES_PASSWORD: brightpath_password
      POSTGRES_DB: brightpath_db
    volumes:
      - brightpath-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brightpath_user -d brightpath_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: brightpath-app
    restart: always 
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s 
      retries: 5  
      start_period: 10s

volumes:
  brightpath-data: